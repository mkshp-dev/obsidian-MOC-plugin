name: Jules State Sync

on:
  pull_request:
    types:
      - opened
      - reopened
      - closed
  issue_comment:
    types:
      - created

permissions:
  contents: read
  issues: write
  pull-requests: read

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  sync_from_pr:
    name: Sync Jules issue state from PR events
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Extract linked issue number from PR body
        id: linked_issue
        shell: bash
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          # Look for a GitHub closing keyword pointing to an issue number, e.g.
          # Closes #123 / Fixes #123 / Resolves #123
          issue_number="$(printf '%s\n' "$PR_BODY" | grep -Eio '\b(close[sd]?|fix(e[sd])?|resolve[sd]?) #[0-9]+' | head -n1 | grep -Eo '#[0-9]+' | tr -d '#' || true)"

          if [ -z "${issue_number:-}" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "issue_number=$issue_number" >> "$GITHUB_OUTPUT"

      - name: Check that linked issue is a Jules issue
        id: issue_meta
        if: steps.linked_issue.outputs.found == 'true'
        shell: bash
        run: |
          set -euo pipefail

          ISSUE_NUMBER="${{ steps.linked_issue.outputs.issue_number }}"

          gh issue view "$ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --json number,state,labels \
            > issue.json

          is_jules="$(jq -r 'any(.labels[]; .name == "jules-queue")' issue.json)"
          issue_state="$(jq -r '.state' issue.json)"

          echo "is_jules=$is_jules" >> "$GITHUB_OUTPUT"
          echo "issue_state=$issue_state" >> "$GITHUB_OUTPUT"

      - name: Move issue to review when PR opens
        if: >
          steps.linked_issue.outputs.found == 'true' &&
          steps.issue_meta.outputs.is_jules == 'true' &&
          (github.event.action == 'opened' || github.event.action == 'reopened')
        shell: bash
        run: |
          set -euo pipefail

          ISSUE_NUMBER="${{ steps.linked_issue.outputs.issue_number }}"

          # Remove any active status labels that shouldn't remain once a PR exists
          gh issue edit "$ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --remove-label "status:in-progress" \
            --remove-label "status:blocked" \
            --add-label "status:review"

      - name: Mark issue done and close it when PR is merged
        if: >
          steps.linked_issue.outputs.found == 'true' &&
          steps.issue_meta.outputs.is_jules == 'true' &&
          github.event.action == 'closed' &&
          github.event.pull_request.merged == true
        shell: bash
        run: |
          set -euo pipefail

          ISSUE_NUMBER="${{ steps.linked_issue.outputs.issue_number }}"

          # Normalize status labels
          gh issue edit "$ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --remove-label "status:in-progress" \
            --remove-label "status:review" \
            --remove-label "status:blocked" \
            --add-label "status:done"

          # Close the issue explicitly since PRs target Dev, not necessarily the default branch
          gh issue close "$ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --comment "Closing automatically because the linked Jules PR was merged into \`Dev\`."

      - name: Mark issue blocked if PR is closed without merge
        if: >
          steps.linked_issue.outputs.found == 'true' &&
          steps.issue_meta.outputs.is_jules == 'true' &&
          github.event.action == 'closed' &&
          github.event.pull_request.merged != true
        shell: bash
        run: |
          set -euo pipefail

          ISSUE_NUMBER="${{ steps.linked_issue.outputs.issue_number }}"

          gh issue edit "$ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --remove-label "status:in-progress" \
            --remove-label "status:review" \
            --add-label "status:blocked"

          gh issue comment "$ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --body "The linked Jules PR was closed without merge. Marking this issue as \`status:blocked\` for maintainer review."

  sync_from_issue_comment:
    name: Sync Jules issue state from blocked comment
    if: github.event_name == 'issue_comment' && github.event.issue.pull_request == null
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check whether this is a Jules issue
        id: issue_meta
        shell: bash
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail

          gh issue view "$ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --json number,state,labels \
            > issue.json

          is_jules="$(jq -r 'any(.labels[]; .name == "jules-queue")' issue.json)"
          has_in_progress="$(jq -r 'any(.labels[]; .name == "status:in-progress")' issue.json)"

          echo "is_jules=$is_jules" >> "$GITHUB_OUTPUT"
          echo "has_in_progress=$has_in_progress" >> "$GITHUB_OUTPUT"

      - name: Move issue to blocked if comment looks like Jules blocked output
        if: >
          steps.issue_meta.outputs.is_jules == 'true' &&
          steps.issue_meta.outputs.has_in_progress == 'true' &&
          contains(github.event.comment.body, '## Blocked')
        shell: bash
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail

          gh issue edit "$ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --remove-label "status:in-progress" \
            --add-label "status:blocked"
