name: Jules Task
description: Structured task for Google Jules
title: "[Jules] "
labels:
  - jules-queue
  - status:todo
body:
  - type: markdown
    attributes:
      value: |
        Use this template for issues intended for Google Jules.

        ```
        Jules will be invoked on a single issue and should:
        - implement only the scope described here
        - run verification commands
        - update `CHANGELOG.md` under `## In-progress`
        - open a PR targeting `Dev`
        ```

  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should be achieved?
      placeholder: |
        Describe the desired end result in plain language.
        Example: Add a setting to control how grouped MOC results are rendered.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What should Jules change, and what should it avoid touching?
      placeholder: |
        Include concrete boundaries. For example:

        ```
        - Update the MOC rendering / extraction logic in the relevant src/... files
        - Add a plugin setting and settings UI if needed
        - Update the MOC creation wizard if the new feature requires config generation support
        - Do not change release workflows, versioning, or unrelated plugin behavior
        - Do not refactor unrelated parsing / rendering code
        ```
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Checklist Jules must satisfy before the task is considered complete
      value: |
        - [ ] The requested behavior is implemented
        - [ ] Existing behavior outside the issue scope remains unchanged
        - [ ] `npm run lint` passes
        - [ ] `npm run build` passes
        - [ ] `CHANGELOG.md` updated under `## In-progress`
    validations:
      required: true

  - type: textarea
    id: changelog
    attributes:
      label: Changelog entry
      description: One user-facing bullet that Jules should add under `CHANGELOG.md` → `## In-progress`
      placeholder: |
        Add support for ...
    validations:
      required: true

  - type: textarea
    id: implementation_notes
    attributes:
      label: Implementation notes / file hints
      description: Relevant files, architecture notes, UI behavior details, or implementation hints
      placeholder: |
        Examples:
        - Relevant files: src/main.ts, src/settings.ts, src/render/..., src/wizard/...
        - Reuse the existing setting registration pattern
        - Preserve current MOC rendering behavior unless explicitly requested
        - The issue is probably caused by ...
    validations:
      required: false

  - type: textarea
    id: out_of_scope
    attributes:
      label: Explicitly out of scope
      description: Optional but recommended — what should Jules avoid changing even if it looks related?
      placeholder: |
        Examples:
        - Do not change the MOC creation wizard UX outside the requested setting/field
        - Do not modify release workflows
        - Do not rename existing config keys
        - Do not alter unrelated filter / grouping behavior
    validations:
      required: false

  - type: textarea
    id: testing_notes
    attributes:
      label: Manual testing notes
      description: Optional steps or scenarios Jules should keep in mind while implementing/testing
      placeholder: |
        Example scenarios:
        - Test with a note containing a simple `moc` block and a complex filtered one
        - Test both grouped and ungrouped MOC output
        - Test the wizard flow if the change affects generated config
        - Test behavior when a folder/filter matches no notes
    validations:
      required: false
